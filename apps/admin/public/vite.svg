<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- App Icon: Hexagonal Node -->
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A192F"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#0A192F"/>
  
  <!-- Hexagon -->
  <polygon 
    points="50,15 75,28 75,58 50,72 25,58 25,28" 
    fill="none" 
    stroke="url(#iconGradient)" 
    stroke-width="4"
  />
  
  <!-- Stylized "b" -->
  <path 
    d="M 50,35 L 50,65 M 50,42 L 62,42 A 8,8 0 0,1 62,58 L 50,58" 
    fill="none" 
    stroke="#00D4FF" 
    stroke-width="5" 
    stroke-linecap="round"
  />
  
  <!-- ECG Heartbeat -->
  <polyline 
    points="30,50 38,50 42,42 46,58 50,50 58,50 70,50" 
    fill="none" 
    stroke="#00D4FF" 
    stroke-width="3" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
</svg>
