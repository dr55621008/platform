<svg viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagonal Node with "b" -->
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A192F"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
  </defs>
  
  <!-- Hexagon -->
  <polygon 
    points="25,5 45,5 55,22 45,40 25,40 15,22" 
    fill="none" 
    stroke="url(#brandGradient)" 
    stroke-width="3"
  />
  
  <!-- Stylized "b" -->
  <path 
    d="M 28,15 L 28,35 M 28,20 L 38,20 A 6,6 0 0,1 38,32 L 28,32" 
    fill="none" 
    stroke="#0A192F" 
    stroke-width="3" 
    stroke-linecap="round"
  />
  
  <!-- ECG Heartbeat Line -->
  <polyline 
    points="15,22 20,22 22,18 24,26 26,22 30,22 32,22" 
    fill="none" 
    stroke="#00D4FF" 
    stroke-width="2" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
  
  <!-- Wordmark: "broker" (bold) -->
  <text 
    x="65" 
    y="32" 
    font-family="Montserrat, sans-serif" 
    font-weight="700" 
    font-size="24" 
    fill="#0A192F"
  >broker</text>
  
  <!-- Wordmark: "Hub" (regular) -->
  <text 
    x="135" 
    y="32" 
    font-family="Montserrat, sans-serif" 
    font-weight="400" 
    font-size="24" 
    fill="#00D4FF"
  >Hub</text>
</svg>
