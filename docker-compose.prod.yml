version: '3.8'

# Production Docker Compose - Hostinger VPS
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  # PostgreSQL - Multi-schema ready
  postgres:
    image: postgres:15-alpine
    container_name: brokerhub-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brokerhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: brokerhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brokerhub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brokerhub-network
    deploy:
      resources:
        limits:
          memory: 1G

  # Redis - Sessions & Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: brokerhub-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brokerhub-network
    deploy:
      resources:
        limits:
          memory: 256M

  # API Service
  api:
    image: ghcr.io/dr55621008/platform/api:latest
    container_name: brokerhub-api
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-brokerhub}:${POSTGRES_PASSWORD}@postgres:5432/brokerhub
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - brokerhub-network
    deploy:
      resources:
        limits:
          memory: 512M

  # Admin Dashboard
  admin:
    image: ghcr.io/dr55621008/platform/admin:latest
    container_name: brokerhub-admin
    restart: always
    environment:
      NODE_ENV: production
      VITE_API_URL: ${ADMIN_API_URL:-http://localhost:3000}
    ports:
      - "${ADMIN_PORT:-3001}:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - brokerhub-network
    deploy:
      resources:
        limits:
          memory: 128M

  # Traefik Reverse Proxy (Optional - for HTTPS)
  # Uncomment if you want automatic HTTPS with Let's Encrypt
  # traefik:
  #   image: traefik:v2.10
  #   container_name: brokerhub-traefik
  #   restart: always
  #   command:
  #     - "--api.insecure=true"
  #     - "--providers.docker=true"
  #     - "--providers.docker.exposedbydefault=false"
  #     - "--entrypoints.web.address=:80"
  #     - "--entrypoints.websecure.address=:443"
  #     - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
  #     - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
  #     - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #     - "8080:8080"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #     - traefik_data:/letsencrypt
  #   networks:
  #     - brokerhub-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  # traefik_data:
  #   driver: local

networks:
  brokerhub-network:
    driver: bridge
