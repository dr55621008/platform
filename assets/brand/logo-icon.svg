<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <!-- brokerHub Icon - Compact Version -->
  <!-- Hexagon with integrated "b" and heartbeat pulse -->
  
  <!-- Outer "b" shape forming hexagon left side -->
  <path 
    d="M 28,5 L 28,45 M 28,12 L 50,12 A 22,22 0 0,1 50,56 L 28,56" 
    fill="none" 
    stroke="#1a3a5c" 
    stroke-width="8" 
    stroke-linecap="round"
  />
  
  <!-- Hexagon right side (completing the shape) -->
  <path 
    d="M 50,12 L 72,25 L 72,43 L 50,56" 
    fill="none" 
    stroke="#1a3a5c" 
    stroke-width="8" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
  
  <!-- Heartbeat pulse inside hexagon -->
  <polyline 
    points="38,34 44,34 47,28 51,40 55,34 62,34" 
    fill="none" 
    stroke="#00b4d8" 
    stroke-width="5" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
</svg>
